server:
  port: 8080

spring:
  application:
    name: un-equipment-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/instrument_share_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:wgx362202}}
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    token-prefix: Bearer
    token-header: Authorization
    jwt-secret: ${APP_JWT_SECRET:change-this-jwt-secret-at-least-32-bytes}
    jwt-expire-seconds: ${APP_JWT_EXPIRE_SECONDS:7200}
