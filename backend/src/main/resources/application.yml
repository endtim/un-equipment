server:
  port: 8080

spring:
  application:
    name: un-equipment-platform
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:${local.datasource.url:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${local.datasource.username:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${local.datasource.password:}}
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  auth:
    default-department-code: ${APP_AUTH_DEFAULT_DEPARTMENT_CODE:TEST_CENTER}
  order:
    pending-audit-timeout-minutes: ${APP_ORDER_PENDING_AUDIT_TIMEOUT_MINUTES:1440}
    pending-audit-timeout-batch-size: ${APP_ORDER_PENDING_AUDIT_TIMEOUT_BATCH_SIZE:200}
    pending-audit-timeout-cron: ${APP_ORDER_PENDING_AUDIT_TIMEOUT_CRON:0 */5 * * * ?}
  finance:
    internal-single-limit: ${APP_FINANCE_INTERNAL_SINGLE_LIMIT:0}
    external-single-limit: ${APP_FINANCE_EXTERNAL_SINGLE_LIMIT:0}
    recharge-double-review-threshold: ${APP_FINANCE_RECHARGE_DOUBLE_REVIEW_THRESHOLD:5000}
    refund-compensation-timeout-minutes: ${APP_FINANCE_REFUND_COMPENSATION_TIMEOUT_MINUTES:30}
    refund-compensation-batch-size: ${APP_FINANCE_REFUND_COMPENSATION_BATCH_SIZE:100}
    refund-compensation-cron: ${APP_FINANCE_REFUND_COMPENSATION_CRON:0 */10 * * * ?}
  security:
    token-prefix: Bearer
    token-header: Authorization
    jwt-secret: ${APP_JWT_SECRET:${local.security.jwt-secret:}}
    jwt-expire-seconds: ${APP_JWT_EXPIRE_SECONDS:7200}
